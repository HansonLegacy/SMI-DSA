exp_name: FFF_finetune_xiehe_5_eamamba
mode: train

model:
  name: bim_vfi
  args:
    pyr_level: 3
    feat_channels: 32
    use_eamamba_synthesis: true
    eamamba_num_blocks: [2, 3, 3, 4]
    eamamba_num_refinement_blocks: 1
    eamamba_ffn_expansion_factor: 2.0
    eamamba_bias: false
    eamamba_layernorm_type: WithBias
    eamamba_checkpoint_percentage: 0.0
    eamamba_channel_mixer_type: Simple
    eamamba_mamba_cfg:
      scan_type: diagonal
      scan_count: 4
      scan_merge_method: concate
      disable_z_branch: false
      d_state: 16
      d_conv: 3
      expand: 1
      conv_2d: true
  # Freeze motion/context branches and only train the new EAMamba synthesis head.
  freeze_modules: ["mfe", "cfe", "bimfn"]  # , "caun"
  unfreeze_epoch: {}

train_dataset:
  name: xiehe_5_datasplit
  args:
    root_path: /mnt/mydrive/data/0627_给超算数据集/脑血管疾病_3D_3/3D_5_xiehe/train
    split: train
    patch_size: 224
  loader:
    batch_size: 8
    num_workers: 8

test_dataset:
  name: xiehe_5_datasplit
  args:
    root_path: /mnt/mydrive/data/0627_给超算数据集/脑血管疾病_3D_3/3D_5_xiehe/train
    split: val
  loader:
    batch_size: 4
    num_workers: 8
  save_imgs: False

optimizer:
  name: adamW
  args: { lr: 1.5e-4, weight_decay: 1.0e-4 }

lr_scheduler:
  name: one_cycle_lr
  args:
    max_lr: 5.0e-4
    pct_start: 0.01
    cycle_momentum: False
    anneal_strategy: cos

gradient_clip: 1

loss:
  - {
    name: multiple_charbonnier,
    args: { weight: 1, gamma: 0.25 }
  }
  - {
    name: multiple_ternary,
    args: { weight: 1, gamma: 0.25 }
  }
  # - {
  #   name: photo_teacher,
  #   args: { weight: 0.5, gamma: 0.25 }
  # }

max_epoch: 400

validate_every: 1
save_every: 1
vis_every: 100

seed: 1234

dist_url: env://

# The checkpoint is loaded with strict=False in trainer.py, so the existing
# BiM-VFI backbone is reused while the new EAMamba synthesis head is initialized
# from scratch.
pretrained: pretrained/bim_vfi_finetune_3dxiehe_train_noblack_in5_ep1.pth

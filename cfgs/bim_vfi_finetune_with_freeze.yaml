exp_name: FFF_finetune_xiehe_5_transunet
mode: train
model:
  name: bim_vfi
  args:
    pyr_level: 3
    feat_channels: 32
    use_transunet: true
    transunet_pretrained: pretrained/transunet/R50+ViT-B_16.npz
    adapter_init_mode: identity
  # 冻结实验：冻结mfe、cfe、bimfn、caun，只训练sn（TransUNet模块）
  freeze_modules: [ "mfe", "cfe", "bimfn", "caun" ]
  unfreeze_epoch: {}

train_dataset:
  name: xiehe_5_datasplit
  args:
    root_path: /mnt/mydrive/data/0627_给超算数据集/脑血管疾病_3D_3/3D_5_xiehe/train
    split: train
    patch_size: 224
  loader:
    batch_size: 8
    num_workers: 8

test_dataset:
  name: xiehe_5_datasplit
  args:
    root_path: /mnt/mydrive/data/0627_给超算数据集/脑血管疾病_3D_3/3D_5_xiehe/train
    split: val
  loader:
    batch_size: 4
    num_workers: 8
  save_imgs: False

optimizer:  # 这里要与train不同，相比调低
  name: adamW  # 这里的lr相当于给定一个初值
  args: { lr: 1.5e-4, weight_decay: 1.e-4 }  # 还没调呢
  # args: { lr: 5.0e-5, weight_decay: 1.e-4 }  # lr调低

lr_scheduler:
  name: one_cycle_lr  # 这个是一个学习率变化策略（分为上升段与下降段）
  args:
    max_lr: 5.0e-4  # 在OneCycle里，学习率围绕max_lr做升降
    pct_start: 0.01  # 上升段占总的epoch的比例
    cycle_momentum: False  # False即：不去同步调整动量，只调 LR
    anneal_strategy: cos  # 这里指的是“从 max_lr 降到很小 LR 的方式”，具体这里cos是指余弦退火
gradient_clip: 1
loss:
  - {
    name: multiple_charbonnier,
    args: { weight: 0.5, gamma: 0.25 }
  }
  - {
    name: multiple_ternary,
    args: { weight: 1, gamma: 0.25 }
  }
  - {
    name: photo_teacher,
    args: { weight: 0.5, gamma: 0.25 }
  }
  # - {
  #   name: flow_distill_res,
  #   args: { weight: 0.005, beta: 1, gamma: 0.5 }
  # }
  # - {
  #   name: flow_teacher_reg,  # 这个不调整的话始终loss为0
  #   args: { weight: 0.005, gamma: 0.5 }
  # }
  # - {
  #   name: flow_smooth_tea1,
  #   args: { weight: 0.05, gamma: 0.5, weight_type: gaussian, edge_constant: 150 }
  # }
max_epoch: 400

validate_every: 2
save_every: 1
vis_every: 10

seed: 1234

dist_url: env://

pretrained: pretrained/bim_vfi.pth  # 这行是额外加的

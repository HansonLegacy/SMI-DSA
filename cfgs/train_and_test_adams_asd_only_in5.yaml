exp_name: aaai_xiaorong_with_adams_only_in5_train_from_ADAMS_Best
mode: train

model:
  name: bim_vfi
  args:
    # --------------------------------------------------------------------------
    # Core backbone
    # --------------------------------------------------------------------------
    pyr_level: 3
    feat_channels: 32

    # --------------------------------------------------------------------------
    # Teacher/KDVCF branch
    # --------------------------------------------------------------------------
    use_teacher_branch: false

    # --------------------------------------------------------------------------
    # Legacy pair-only / legacy sequence context paths
    # --------------------------------------------------------------------------
    use_bim_prior_predictor: false
    use_video_sequence_context: false
    use_local_fine_context: false
    use_global_memory_context: false

    # --------------------------------------------------------------------------
    # ADAMS encoder
    # In this ablation, ADAMS is enabled and its anatomical context is routed to
    # ASD. DMS-Flow/DMSE is disabled below.
    # --------------------------------------------------------------------------
    use_adams_encoder: true
    adams_encoder:
      name: adams
      args:
        feat_channels: 32
        image_channels: 3
        stem_image_channels: 3
        channel_multipliers: [1, 2, 4]
        min_stem_size: 8
        near_window: 1
        base_token_grid: 8
        temporal_sigma: 2.0
        lambda_dynamic: 0.75
        lambda_anatomical: 0.25
        mu_dynamic: 0.25
        mu_anatomical: 0.25
        squeeze_single_tau: false

    # --------------------------------------------------------------------------
    # Disable DMS-Flow / DMSE.
    # With use_dmse=false and use_bim_prior_predictor=false, the motion-state
    # route falls back to the uniform BiM prior instead of DMS-Flow.
    # --------------------------------------------------------------------------
    use_dmse: false

    # --------------------------------------------------------------------------
    # ASD decoder
    # ADAMS anatomical context is passed to ASD in forward_one_lvl.
    # --------------------------------------------------------------------------
    use_asd: true
    asd:
      name: asd
      args:
        feat_channels: 32

  freeze_modules: []

train_dataset:
  name: video_sequence_global_context_folder
  args:
    root_path: /home/ppq5umrb/whcs-share46/LJX/3D_5_xiehe/3D_xiehe_noblack_seq/train_512
    split: train
    interp_num: 5
    enumerate_all_targets: true
    patch_size: 256
    clip_length: 4
    pad_to_clip_length: true
    output_pair_fields: true
    val_ratio: 0.05

    global_context_source: sparse_anchors
    global_context_max_frames: null
    position_norm_mode: one_based

    output_local_context_fields: true
    output_sparse_sequence_fields: true
  loader:
    batch_size: 12
    num_workers: 12

test_dataset:
  name: video_sequence_global_context_folder
  args:
    root_path: /home/ppq5umrb/whcs-share46/LJX/3D_5_xiehe/3D_xiehe_noblack_seq/train_512
    split: val
    interp_num: 5
    enumerate_all_targets: true
    eval_size: [512, 512]
    val_test_patch_mode: resize
    clip_length: 4
    pad_to_clip_length: true
    output_pair_fields: true
    val_ratio: 0.05

    global_context_source: sparse_anchors
    global_context_max_frames: null
    position_norm_mode: one_based

    output_local_context_fields: true
    output_sparse_sequence_fields: true
  loader:
    batch_size: 16
    num_workers: 8
  save_imgs: false

optimizer:
  name: adamW
  args: { lr: 5.0e-5, weight_decay: 1.0e-4 }

lr_scheduler:
  name: one_cycle_lr
  args:
    max_lr: 8.0e-5
    pct_start: 0.05
    div_factor: 2.0
    final_div_factor: 10.0
    cycle_momentum: false
    anneal_strategy: cos

gradient_clip: 1

loss:
  - {
    name: multiple_charbonnier,
    args: { weight: 1, gamma: 0.25 }
  }
  - {
    name: multiple_ternary,
    args: { weight: 1, gamma: 0.25 }
  }

max_epoch: 400

validate_every: 1
save_every: 100
vis_every: 100

seed: 1234

dist_url: env://

test_before_train: false

pretrained: /home/ppq5umrb/whcs-share46/LJX/BiM-VFI/save/train_and_test_adams_asd_only_in5_aaai_xiaorong_with_adams_only_in5_train_from_ADAMS_Best/checkpoints/model_best.pth
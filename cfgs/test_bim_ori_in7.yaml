exp_name: Test_bim_ori_in7_full_seq
mode: test

distributed: false
gpu: 0
num_gpus: 4

save_root: test_outputs
validation_metric_sync: file
validation_file_sync_timeout_seconds: 86400

test_dataset:
  name: video_sequence_global_context_folder
  args:
    root_path: /home/ppq5umrb/whcs-share46/LJX/3D_5_xiehe/3D_xiehe_noblack_seq/test_512
    split: test
    interp_num: 7
    enumerate_all_targets: true
    eval_size: [512, 512]
    val_test_patch_mode: resize
    clip_length: 4
    pad_to_clip_length: true
    output_pair_fields: true
    val_ratio: 0.05

    global_context_source: sparse_anchors
    global_context_max_frames: null
    position_norm_mode: one_based

    output_local_context_fields: true
    output_sparse_sequence_fields: true
  loader:
    batch_size: 16
    num_workers: 8
    balance_by_cost: true
  save_imgs: false

models:
  - name: bim_vfi
    type: bimvfi
    resume: pretrained/bim_vfi_finetune_3dxiehe_train_noblack_in5_ep1.pth
    args:
      pyr_level: 3
      feat_channels: 32

      use_transunet: false
      transunet_pretrained: pretrained/transunet/R50+ViT-B_16.npz

      use_bim_prior_predictor: false
      bim_prior_hidden_channels: 32
      bim_prior_use_img_diff: false
      bim_prior_use_last_state: false
      freeze_bim_prior: false

test:
  batch_size: 4
  num_workers: 4
  save_imgs: false
  save_path: test_outputs

seed: 1234
